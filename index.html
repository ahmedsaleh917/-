<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفاء الروح | التطوير الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --main-green: #1a4d2e;
            --gold-accent: #d4af37;
            --soft-white: #f8fafc;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body {
            margin: 0;
            font-family: 'Almarai', sans-serif;
            background-color: var(--soft-white);
            color: #333;
        }

        /* الهيدر الجديد */
        .header-container {
            height: 250px;
            background: linear-gradient(rgba(26, 77, 46, 0.7), rgba(26, 77, 46, 0.5)), 
                        url('https://i.postimg.cc/zvS6s80G/IMG-20260404-200653.jpg') center/cover;
            position: relative;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* الأيقونة البارزة */
        .logo-wrapper {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .main-logo {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 25px; /* شكل مربع منحني عصري */
            padding: 5px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #fff;
        }

        .main-logo img {
            width: 90%;
            border-radius: 20px;
        }

        /* النصوص العلوية */
        .brand-section {
            text-align: center;
            margin-top: 60px;
            margin-bottom: 30px;
        }

        .brand-section h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--main-green);
            margin: 0;
        }

        .brand-section p {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        /* شبكة الأقسام */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px 40px 20px;
        }

        .nav-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .nav-card:active {
            transform: scale(0.95);
            background: #f0f4f2;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(26, 77, 46, 0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            position: relative;
        }

        .icon-box i {
            font-size: 22px;
            color: var(--main-green);
        }

        .audio-indicator {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--gold-accent);
            color: white;
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .nav-card span {
            font-size: 13px;
            font-weight: 700;
            color: #2c3e50;
        }

        /* الفوتر المحسن */
        .dev-footer {
            padding: 25px;
            text-align: center;
            background: #fff;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
        }

        .dev-footer .power {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dev-footer .brand-name {
            display: block;
            font-size: 14px;
            font-weight: 800;
            color: var(--main-green);
            margin-top: 4px;
        }

        .brand-name span {
            color: var(--gold-accent);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-wrapper">
            <div class="main-logo">
                <img src="https://i.postimg.cc/05cL5zw5/20260405-135743.png" alt="Logo">
            </div>
        </div>
    </div>

    <div class="brand-section">
        <h1>صفاء الروح</h1>
        <p>مساحتك الروحية للذكر والهدوء</p>
    </div>

    <div class="app-grid">
        
        <a href="https://ahmedsaleh917.github.io/quran/" class="nav-card">
            <div class="icon-box">
                <i class="fa-solid fa-book-quran"></i>
                <div class="audio-indicator"><i class="fa-solid fa-headphones"></i></div>
            </div>
            <span>القرآن الكريم</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/azkar/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-hands-praying"></i></div>
            <span>الأذكار</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/ruqia/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-shield-heart"></i></div>
            <span>الرقية الشرعية</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/akhtbar/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-lightbulb"></i></div>
            <span>اختبر معلوماتك الدينية</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/awkat-alslat/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-mosque"></i></div>
            <span>أوقات الصلاة</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/msbaha/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-circle-dot"></i></div>
            <span>مسبحة إلكترونية</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/ahlam/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-cloud-moon"></i></div>
            <span>تفسير الأحلام</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/omrah/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-kaaba"></i></div>
            <span>دليل الحج والعمرة</span>
        </a>

    </div>

    <div class="dev-footer">
        <span class="power">Powered by</span>
        <span class="brand-name">تطوير <span>sabriFX</span></span>
    </div>

</body>
</html>
