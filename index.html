<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صفاء الروح | التطوير الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --main-green: #1a4d2e;
            --gold-accent: #d4af37;
            --soft-white: #f8fafc;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Almarai', sans-serif;
            background-color: var(--soft-white);
            color: #333;
            overflow-x: hidden; /* لمنع المشاكل في WebView */
            -webkit-tap-highlight-color: transparent; /* إزالة اللون الأزرق عند اللمس */
        }

        /* الهيدر المحسن */
        .header-container {
            height: 220px;
            background: linear-gradient(rgba(26, 77, 46, 0.6), rgba(26, 77, 46, 0.4)), 
                        url('https://i.postimg.cc/zvS6s80G/IMG-20260404-200653.jpg') center/cover;
            position: relative;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-wrapper {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .main-logo {
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 22px;
            padding: 5px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        }

        .main-logo img {
            width: 85%;
            border-radius: 18px;
        }

        .brand-section {
            text-align: center;
            margin-top: 55px;
            margin-bottom: 25px;
        }

        .brand-section h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--main-green);
            margin: 0;
        }

        .brand-section p {
            font-size: 13px;
            color: #777;
            margin-top: 4px;
        }

        /* شبكة الأقسام المعدلة لسكتشوير */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 15px 30px 15px;
        }

        .nav-card {
            background: #fff;
            border-radius: 18px;
            padding: 18px 8px;
            text-align: center;
            text-decoration: none;
            transition: 0.2s ease;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-card:active {
            transform: scale(0.96);
            background: #fdfdfd;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: rgba(26, 77, 46, 0.06);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            position: relative;
        }

        .icon-box i {
            font-size: 20px;
            color: var(--main-green);
        }

        .audio-indicator {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--gold-accent);
            color: white;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 8px;
        }

        .nav-card span {
            font-size: 12px;
            font-weight: 700;
            color: #2c3e50;
        }

        /* الفوتر ليبقى متوافقاً مع الاعلانات في الاسفل */
        .dev-footer {
            padding: 20px;
            text-align: center;
            background: transparent;
            margin-bottom: 20px;
        }

        .dev-footer .power {
            font-size: 10px;
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .dev-footer .brand-name {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: var(--main-green);
            margin-top: 3px;
        }

        .brand-name span { color: var(--gold-accent); }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-wrapper">
            <div class="main-logo">
                <img src="https://i.postimg.cc/05cL5zw5/20260405-135743.png" alt="Logo">
            </div>
        </div>
    </div>

    <div class="brand-section">
        <h1>صفاء الروح</h1>
        <p>مساحتك الروحية للذكر والهدوء</p>
    </div>

    <div class="app-grid">
        <a href="https://ahmedsaleh917.github.io/quran/" class="nav-card">
            <div class="icon-box">
                <i class="fa-solid fa-book-quran"></i>
                <div class="audio-indicator"><i class="fa-solid fa-headphones"></i></div>
            </div>
            <span>القرآن الكريم</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/azkar/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-hands-praying"></i></div>
            <span>الأذكار</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/ruqia/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-shield-heart"></i></div>
            <span>الرقية الشرعية</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/akhtbar/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-lightbulb"></i></div>
            <span>اختبر معلوماتك</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/awkat-alslat/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-mosque"></i></div>
            <span>أوقات الصلاة</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/msbaha/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-circle-dot"></i></div>
            <span>مسبحة إلكترونية</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/ahlam/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-cloud-moon"></i></div>
            <span>تفسير الأحلام</span>
        </a>

        <a href="https://ahmedsaleh917.github.io/omrah/" class="nav-card">
            <div class="icon-box"><i class="fa-solid fa-kaaba"></i></div>
            <span>دليل العمرة</span>
        </a>
    </div>

    <div class="dev-footer">
        <span class="power">Powered by</span>
        <span class="brand-name">تطوير <span>sabriFX</span></span>
    </div>

</body>
</html>
