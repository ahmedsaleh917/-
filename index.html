<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>صفاء الروح</title>

<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Amiri:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
--main:#1a4d2e;
--gold:#d4af37;
--bg:#f4f7f6;
}

body{
margin:0;
font-family:'Almarai',sans-serif;
background:var(--bg);
}

/* الهيدر */
.header{
height:350px;
background:url('https://i.postimg.cc/zvS6s80G/IMG-20260404-200653.jpg') center/cover;
position:relative;
}

.header::after{
content:'';
position:absolute;
bottom:0;
width:100%;
height:80px;
background:linear-gradient(transparent,#f4f7f6);
}

.logo{
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
width:90px;height:90px;
border-radius:50%;
background:#fff;
display:flex;align-items:center;justify-content:center;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.logo img{
width:85%;border-radius:50%;
}

/* الاسم */
.title{
text-align:center;
margin-top:60px;
font-weight:800;
color:var(--main);
}

.desc{
text-align:center;
font-size:12px;
color:#777;
margin-bottom:20px;
}

/* كرت القرآن */
.card{
background:#fff;
margin:15px;
padding:15px;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,.07);
}

/* الأقسام */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.item{
background:#fff;
border-radius:18px;
padding:18px;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,.06);
cursor:pointer;
transition:.3s;
}

.item:hover{
transform:scale(.97);
}

.item i{
font-size:22px;
color:var(--main);
margin-bottom:8px;
}

.item span{
display:block;
font-size:13px;
font-weight:700;
color:var(--main);
}

/* الفوتر */
.footer{
margin:20px;
text-align:center;
font-size:12px;
color:#999;
}
</style>
</head>

<body>

<!-- الهيدر -->
<div class="header">
<div class="logo">
<img src="https://i.postimg.cc/05cL5zw5/20260405-135743.png">
</div>
</div>

<h2 class="title">صفاء الروح</h2>
<p class="desc">مساحتك للأذكار والسكينة</p>

<!-- كرت -->
<div class="card">
<p id="verse">...</p>
</div>

<!-- الأقسام -->
<div class="grid">

<div class="item" onclick="openPage('https://ahmedsaleh917.github.io/quran/')">
<i class="fa-solid fa-book-quran"></i>
<span>القرآن</span>
</div>

<div class="item" onclick="openPage('https://ahmedsaleh917.github.io/azkar/')">
<i class="fa-solid fa-hands-praying"></i>
<span>الأذكار</span>
</div>

<div class="item" onclick="openPage('https://ahmedsaleh917.github.io/ruqia/')">
<i class="fa-solid fa-shield-heart"></i>
<span>الرقية</span>
</div>

<div class="item" onclick="openPage('https://ahmedsaleh917.github.io/akhtbar/')">
<i class="fa-solid fa-brain"></i>
<span>اختبار</span>
</div>

<div class="item" onclick="openPage('https://ahmedsaleh917.github.io/awkat-alslat/')">
<i class="fa-solid fa-mosque"></i>
<span>الصلاة</span>
</div>

<div class="item" onclick="openPage('https://ahmedsaleh917.github.io/msbaha/')">
<i class="fa-solid fa-beads"></i>
<span>المسبحة</span>
</div>

<div class="item" onclick="openPage('https://ahmedsaleh917.github.io/ahlam/')">
<i class="fa-solid fa-moon"></i>
<span>الأحلام</span>
</div>

<div class="item" onclick="openPage('https://ahmedsaleh917.github.io/omrah/')">
<i class="fa-solid fa-kaaba"></i>
<span>الحج</span>
</div>

</div>

<div class="footer">
sabriFX ✨
</div>

<script>
const verses = [
"ألا بذكر الله تطمئن القلوب",
"إن مع العسر يسرا",
"لا تقنطوا من رحمة الله"
];

document.getElementById("verse").innerText =
verses[Math.floor(Math.random()*verses.length)];

function openPage(url){
window.location.href=url;
}
</script>

</body>
</html>
