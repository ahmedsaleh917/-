<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفاء الروح | تجربة إيمانية فاخرة</title>
    
    <!-- استدعاء خطوط احترافية ومزخرفة -->
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg-dark: #050505;
            --accent-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b8860b 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(212, 175, 55, 0.15);
            --glass-effect: blur(15px) saturate(180%);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Almarai', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(212, 175, 55, 0.05) 0%, transparent 30%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* تأثير الجزيئات المتساقطة */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        /* ===== الهيدر الإبداعي ===== */
        .header {
            position: relative;
            height: 360px;
            margin: 15px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--card-border);
            z-index: 10;
        }

        .header-bg {
            position: absolute;
            inset: 0;
            background: url('https://i.postimg.cc/X7S11Jh6/IMG-20260414-220830.jpg') center/cover no-repeat;
            transform: scale(1.1);
            filter: brightness(0.4) contrast(1.1);
            transition: transform 10s ease;
        }

        .header:hover .header-bg {
            transform: scale(1.0);
        }

        .header-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(5,5,5,1));
        }

        .header-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* الإطار الدائري */
        .logo-ring {
            width: 115px;
            height: 115px;
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            position: relative;
            animation: pulse-gold 3s infinite;
            background: rgba(0,0,0,0.5);
            padding: 4px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .logo-ring img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        /* العنوان بخط مزخرف واحترافي */
        .header h1 {
            font-family: 'Aref Ruqaa', serif; /* خط رقعة احترافي ومزخرف */
            font-size: 46px;
            margin: 0;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.4);
            letter-spacing: 1px;
            font-weight: 700;
        }

        /* العبارة التعريفية بعبير إبداعي */
        .header p {
            font-family: 'Amiri', serif;
            font-size: 16px;
            color: #e0e0e0;
            margin-top: 8px;
            font-weight: 400;
            letter-spacing: 0.3px;
            max-width: 85%;
            line-height: 1.6;
            font-style: italic;
        }

        .plus-badge {
            margin-top: 15px;
            background: var(--gold-gradient);
            color: #000;
            padding: 4px 18px;
            border-radius: 20px;
            font-family: 'Poppins';
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* ===== شبكة الأقسام ===== */
        .main-container {
            flex: 1;
            padding: 10px 20px 100px 20px;
            z-index: 5;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .nav-card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: var(--glass-effect);
            -webkit-backdrop-filter: var(--glass-effect);
            border-radius: 24px;
            padding: 25px 15px;
            text-align: center;
            border: 1px solid var(--card-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            cursor: pointer;
        }

        .nav-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 25px rgba(212, 175, 55, 0.15);
        }

        .nav-card:active {
            transform: scale(0.95);
        }

        .icon-wrapper {
            width: 65px;
            height: 65px;
            margin: 0 auto 15px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s;
        }

        .nav-card:hover .icon-wrapper {
            background: var(--accent-gold);
            transform: rotate(10deg);
        }

        .icon-wrapper i {
            font-size: 28px;
            color: var(--accent-gold);
            transition: all 0.4s;
        }

        .nav-card:hover .icon-wrapper i {
            color: #000;
        }

        .nav-card span {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* ===== الفوتر ===== */
        .footer {
            padding: 35px;
            text-align: center;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        .footer-text {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .footer-text b {
            color: var(--accent-gold);
            font-weight: 800;
            margin: 0 5px;
        }

        .designer-brand {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 18px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            font-size: 11px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
        }

        /* تحسينات الشاشات الصغيرة */
        @media (max-width: 380px) {
            .app-grid { gap: 15px; }
            .nav-card { padding: 20px 10px; }
            .header { height: 320px; }
            .header h1 { font-size: 38px; }
            .logo-ring { width: 95px; height: 95px; }
        }

        /* تأثيرات الظهور */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <canvas class="particles" id="canvas"></canvas>

    <!-- الهيدر المطور -->
    <header class="header animate__animated animate__fadeInDown">
        <div class="header-bg"></div>
        <div class="header-overlay"></div>
        <div class="header-content">
            <div class="logo-ring">
                <img src="https://i.postimg.cc/3wGz4yfs/file-00000000faac71f7a2adb5fc2017f95e.png" alt="صفاء الروح">
            </div>
            <h1>صفاء الروح</h1>
            <p>هنا عالم الصفاء الروحاني.. حيثُ ترتقي النفسُ في معارجِ النور، وتستكينُ القلوبُ بذكرِ الرحمن.</p>
            <div class="plus-badge">PREMIUM PLUS</div>
        </div>
    </header>

    <!-- محتوى التطبيق الرئيسي -->
    <main class="main-container">
        <div class="app-grid">
            
            <div onclick="smartNav('quran')" class="nav-card fade-in-up" style="animation-delay: 0.1s;">
                <div class="icon-wrapper"><i class="fa-solid fa-book-open-reader"></i></div>
                <span>القرآن الكريم</span>
            </div>

            <div onclick="smartNav('azkar')" class="nav-card fade-in-up" style="animation-delay: 0.2s;">
                <div class="icon-wrapper"><i class="fa-solid fa-hands-praying"></i></div>
                <span>الأذكار اليومية</span>
            </div>

            <div onclick="smartNav('ruqia')" class="nav-card fade-in-up" style="animation-delay: 0.3s;">
                <div class="icon-wrapper"><i class="fa-solid fa-shield-heart"></i></div>
                <span>الرقية الشرعية</span>
            </div>

            <div onclick="smartNav('akhtbar')" class="nav-card fade-in-up" style="animation-delay: 0.4s;">
                <div class="icon-wrapper"><i class="fa-solid fa-lightbulb"></i></div>
                <span>اختبر معلوماتك</span>
            </div>

            <div onclick="smartNav('awkat-alslat')" class="nav-card fade-in-up" style="animation-delay: 0.5s;">
                <div class="icon-wrapper"><i class="fa-solid fa-mosque"></i></div>
                <span>مواقيت الصلاة</span>
            </div>

            <div onclick="smartNav('msbaha')" class="nav-card fade-in-up" style="animation-delay: 0.6s;">
                <div class="icon-wrapper"><i class="fa-solid fa-circle-nodes"></i></div>
                <span>المسبحة الذكية</span>
            </div>

            <div onclick="smartNav('ahlam')" class="nav-card fade-in-up" style="animation-delay: 0.7s;">
                <div class="icon-wrapper"><i class="fa-solid fa-cloud-moon"></i></div>
                <span>تفسير الأحلام</span>
            </div>

            <div onclick="smartNav('omrah')" class="nav-card fade-in-up" style="animation-delay: 0.8s;">
                <div class="icon-wrapper"><i class="fa-solid fa-kaaba"></i></div>
                <span>دليل العمرة</span>
            </div>

        </div>
    </main>

    <!-- الفوتر المطور -->
    <footer class="footer">
        <div class="footer-text">
            صُمم بكل إبداع بواسطة <b>sabriFX</b> ✨
        </div>
        <div class="designer-brand">Visual Experience v4.0</div>
    </footer>

    <script>
        // نظام التنقل الذكي
        function smartNav(section) {
            const githubBase = "https://ahmedsaleh917.github.io/";
            const localFile = section + ".html";
            
            if (window.navigator.vibrate) {
                window.navigator.vibrate(30);
            }

            if (navigator.onLine) {
                window.location.href = githubBase + section + "/";
            } else {
                window.location.href = localFile;
            }
        }

        // تأثير الجزيئات في الخلفية
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(212, 175, 55, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            const count = Math.floor(window.innerWidth / 10);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            initCanvas();
            createParticles();
        });
        initCanvas();
        createParticles();
        animate();
    </script>
</body>
</html>
